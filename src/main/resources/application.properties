server.port=8080
spring.application.name=fraud-detection-platform

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.streams.application-id=fraud-detection-streams
spring.kafka.consumer.group-id=fraud-detection-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.cassandra.contact-points=${CASSANDRA_HOST:localhost}
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=frauddetection

spring.elasticsearch.uris=${ELASTICSEARCH_URI:http://localhost:9200}

spring.datasource.url=jdbc:h2:mem:fraudrulesdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
